<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Azeroth's Most Wanted AMW Favicon</title>
  <desc id="desc">Transparent fantasy shield favicon using AMW initials with gold, dark green, fel green, and purple accents.</desc>
  <defs>
    <radialGradient id="felGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#baff43" stop-opacity="0.95"/>
      <stop offset="38%" stop-color="#5f8f1f" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0b1409" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#28381a"/>
      <stop offset="0.45" stop-color="#10160e"/>
      <stop offset="1" stop-color="#070806"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0a8"/>
      <stop offset="0.22" stop-color="#d8a73a"/>
      <stop offset="0.55" stop-color="#f8d36f"/>
      <stop offset="1" stop-color="#76521a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3c3322"/>
      <stop offset="0.5" stop-color="#d1aa4b"/>
      <stop offset="1" stop-color="#17130d"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25102e"/>
      <stop offset="0.5" stop-color="#b348d4"/>
      <stop offset="1" stop-color="#2a102f"/>
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.75"/>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background by design: no background rectangle. -->
  <g filter="url(#shadow)">
    <path d="M256 28 L322 86 L420 91 L386 168 L430 252 L359 303 L335 421 L256 484 L177 421 L153 303 L82 252 L126 168 L92 91 L190 86 Z" fill="#090b08" stroke="url(#edge)" stroke-width="14" stroke-linejoin="round"/>
    <path d="M256 57 L309 104 L386 108 L358 169 L394 240 L335 282 L315 391 L256 440 L197 391 L177 282 L118 240 L154 169 L126 108 L203 104 Z" fill="url(#shield)" stroke="#090907" stroke-width="7" stroke-linejoin="round"/>
    <path d="M94 93 C45 106 35 160 55 196 C65 148 96 145 132 147 Z" fill="#15150f" stroke="url(#edge)" stroke-width="8" stroke-linejoin="round"/>
    <path d="M418 93 C467 106 477 160 457 196 C447 148 416 145 380 147 Z" fill="#15150f" stroke="url(#edge)" stroke-width="8" stroke-linejoin="round"/>
    <path d="M66 252 L21 276 L75 292 Z" fill="#18160f" stroke="url(#edge)" stroke-width="7" stroke-linejoin="round"/>
    <path d="M446 252 L491 276 L437 292 Z" fill="#18160f" stroke="url(#edge)" stroke-width="7" stroke-linejoin="round"/>

    <circle cx="256" cy="238" r="146" fill="url(#felGlow)" filter="url(#softGlow)" opacity="0.82"/>

    <path d="M256 110 L289 181 L256 230 L223 181 Z" fill="#172015" stroke="url(#edge)" stroke-width="9" stroke-linejoin="round"/>
    <path d="M183 160 C196 113 231 85 256 70 C244 113 235 148 233 190 Z" fill="#1c1b13" stroke="url(#edge)" stroke-width="8" stroke-linejoin="round"/>
    <path d="M329 160 C316 113 281 85 256 70 C268 113 277 148 279 190 Z" fill="#1c1b13" stroke="url(#edge)" stroke-width="8" stroke-linejoin="round"/>

    <path d="M164 324 C123 297 101 258 95 215 C126 240 155 255 189 255 Z" fill="#11100c" stroke="#7e652f" stroke-width="7" stroke-linejoin="round" opacity="0.96"/>
    <path d="M348 324 C389 297 411 258 417 215 C386 240 357 255 323 255 Z" fill="url(#purple)" stroke="#806438" stroke-width="7" stroke-linejoin="round" opacity="0.96"/>

    <path d="M221 276 C219 253 237 238 256 238 C275 238 293 253 291 276 C289 307 274 329 256 329 C238 329 223 307 221 276 Z" fill="#c29a45" stroke="#12100a" stroke-width="8"/>
    <path d="M229 275 L246 267 L242 287 Z M283 275 L266 267 L270 287 Z" fill="#9cff28" opacity="0.95"/>
    <path d="M243 310 H269 M241 295 H271 M256 291 V321 M236 302 H276" stroke="#19160f" stroke-width="5" stroke-linecap="round"/>

    <path d="M120 350 L203 373 L256 360 L309 373 L392 350 L357 402 L256 424 L155 402 Z" fill="#11100d" stroke="url(#edge)" stroke-width="8" stroke-linejoin="round"/>
    <path d="M226 403 L256 438 L286 403 Z" fill="#6ea314" stroke="url(#edge)" stroke-width="7" stroke-linejoin="round"/>

    <text x="256" y="281" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="136" font-weight="900" letter-spacing="-10" fill="#1c1204" stroke="#050403" stroke-width="14" paint-order="stroke">AMW</text>
    <text x="256" y="281" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="136" font-weight="900" letter-spacing="-10" fill="url(#gold)" stroke="#f5d06a" stroke-width="2">AMW</text>
  </g>
</svg>
