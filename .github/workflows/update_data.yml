name: Update WoW Guild Data

on:
  schedule:
    - cron: '5/20 * * * *'
  workflow_dispatch:

# NEW: We must give the action global permission to write to both the repo and GitHub Pages
permissions:
  contents: write
  pages: write      
  id-token: write   

jobs:
  auto-update-wow-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore SQLite Database from SQL Dump
        run: |
          mkdir -p asset
          if [ -f asset/guild.sql ]; then
            echo "Restoring database from SQL dump..."
            
            # FORCE DELETE the old binary file so we always start with a clean slate!
            rm -f asset/guild.db
            
            # Safely rebuild the DB from text
            sqlite3 asset/guild.db < asset/guild.sql
          fi

      - name: Run Python Script
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
        run: python main.py

      - name: Convert SQLite to Text Dump (History Protection)
        run: |
          if [ -f asset/guild.db ]; then
            echo "Dumping database to text for permanent history..."
            # Overwrite the text file only if the DB exists and is valid
            sqlite3 asset/guild.db .dump > asset/guild.sql
            # Delete the binary file so it never gets committed to git
            rm asset/guild.db
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Explicitly add ONLY the SQL and HTML file, ignoring accidental junk
          git add asset/guild.sql index.html
          
          git commit -m "Auto-update WoW guild data & SQL timeline" || echo "No changes to commit"
          git push

  # --- NEW: Deploy to GitHub Pages ONLY after the data job above finishes ---
  deploy:
    needs: auto-update-wow-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Latest Code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4